name: Deploy Next.js Site to Pages

on:
  push:
    branches: ["main"] # Triggers every time you push to your main branch
  workflow_dispatch: # Allows you to manually trigger the build from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Static Build Next.js
        run: pnpm run build

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.next # Next.js outputs static export structures here

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
