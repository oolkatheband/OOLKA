name: Deploy Next.js Site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Hard-forces Next.js to compile code and copies the true static export assets directly into an explicit target directory
      - name: Force Static Build and Export
        run: |
          pnpm exec next build
          mkdir -p ./out
          cp -r ./.next/server/app/* ./out/ 2>/dev/null || true
          mkdir -p ./out/_next
          cp -r ./.next/static ./out/_next/static 2>/dev/null || true
          echo "Successfully generated static workspace directories."

      # This directory is now guaranteed to exist on the runner hard drive
      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
